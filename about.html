<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings & Options</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 1. Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* 2. Background Image Container (चेहरा छुपाए बिना ऑप्शंस बीच में) */
        .bg-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/ZoxUDZ3.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center; /* ऑप्शंस को वर्टिकली बिल्कुल बीच में रखने के लिए */
            align-items: center;
            padding: 20px;
        }

        /* बैकग्राउंड इमेज को थोड़ा सा डार्क शेड देने के लिए ताकि टेक्स्ट साफ़ दिखे */
        .bg-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.35); 
            z-index: 1;
        }

        /* 3. Top Header Section (यह हमेशा ऊपर फिक्स रहेगा) */
        .about-header {
            position: absolute;
            top: 40px;
            left: 5%;
            z-index: 2;
            width: 90%;
            max-width: 400px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.1s ease;
        }

        .back-btn:active {
            transform: scale(0.9);
        }

        .page-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-left: 15px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        /* 4. Options Glass Box (स्क्रीन के बिल्कुल बीच में) */
        .options-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.08); /* प्रीमियम ट्रांसपेरेंट लुक */
            backdrop-filter: blur(25px); /* पीछे की इमेज को शानदार ब्लर इफ़ेक्ट देगा */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px; /* घुमावदार कोर्ड्स ताकि चेहरा नीचे साफ़ दिखे */
            padding: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.4s ease-out;
        }

        /* 5. Option Row Items */
        .option-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.2s ease, transform 0.1s ease;
            border-radius: 14px;
        }

        .option-item:last-child {
            border-bottom: none; /* लास्ट आइटम की लाइन हटा दी */
        }

        /* टैप करने पर कड़क क्लिक इफ़ेक्ट */
        .option-item:active {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(0.98);
        }

        .option-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .option-left i {
            font-size: 18px;
            width: 24px;
            text-align: center;
            opacity: 0.9;
        }

        .option-right i {
            font-size: 12px;
            opacity: 0.5;
        }

        /* 6. Admin Panel Special Red Style */
        .admin-item {
            color: #ff4d4d !important; /* चमकदार लाल रंग जो अलग ही चमकेगा */
            font-weight: 600;
        }
        
        .admin-item i {
            color: #ff4d4d !important;
        }

        /* सुंदर एंट्री एनिमेशन */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        
        <div class="about-header">
            <a href="javascript:history.back()" class="back-btn" title="Go Back">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <span class="page-title">सेटिंग्स</span>
        </div>

        <div class="options-container">
            
            <a href="about_us.html" class="option-item">
                <div class="option-left">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>About us</span>
                </div>
                <div class="option-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>

            <a href="privacy.html" class="option-item">
                <div class="option-left">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>Privacy and policy</span>
                </div>
                <div class="option-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>

            <a href="admin.html" class="option-item admin-item">
                <div class="option-left">
                    <i class="fa-solid fa-user-gear"></i>
                    <span>Admin Panel</span>
                </div>
                <div class="option-right"><i class="fa-solid fa-chevron-right"></i></div>
            </a>
            
        </div>
    </div>

    <script>
        document.querySelectorAll('.option-item').forEach(item => {
            item.addEventListener('click', function(e) {
                // यहाँ आप चाहें तो कोई क्लिक साउंड या अतिरिक्त कस्टम लॉजिक जोड़ सकते हैं
                console.log(this.querySelector('span').innerText + " पर क्लिक किया गया!");
            });
        });
    </script>

</body>
</html>
