<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>जनता वाणी - एडमिन पैनल</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <div class="dashboard-container" id="dashboardBox">
        
        <header class="dash-header">
            <img src="https://i.imgur.com/cwBsse2.jpeg" alt="Janta Vani Logo" class="admin-logo-dash">
            <button class="logout-btn" id="logoutBtn">लॉगआउट</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon-box">
                    <svg class="stat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
                <div class="stat-info">
                    <h3>कुल व्यूज (Total Views)</h3>
                    <p id="totalViews"> do...</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-box">
                    <svg class="stat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <div class="stat-info">
                    <h3>कुल पोस्ट (Total Posts)</h3>
                    <p id="totalPosts">लोड हो रहा है...</p>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn active" id="btnUploadNav">नई पोस्ट अपलोड करें</button>
            <button class="action-btn" id="btnManageNav">पोस्ट मैनेज करें</button>
        </div>

        <div class="section-box" id="uploadSection">
            <h2>नई न्यूज़ पोस्ट अपलोड करें</h2>
            <form id="newsForm">
                
                <div class="form-group">
                    <label>न्यूज़ टाइटल (मुख्य हेडिंग)</label>
                    <input type="text" id="newsTitle" placeholder="यहाँ मुख्य खबर लिखें..." required>
                </div>
                
                <div class="form-group">
                    <label>न्यूज़ डिस्क्रिप्शन (विवरण)</label>
                    <textarea id="newsDesc" placeholder="घटना की पूरी जानकारी यहाँ डालें..." required></textarea>
                </div>

                <div class="form-group">
                    <label>घटना की लोकेशन (मैनुअल टाइप करें)</label>
                    <input type="text" id="newsLocation" placeholder="जैसे: चंदला, छतरपुर" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>कैटेगरी चुनें</label>
                    <select id="newsCategory" required>
                        <option value="" disabled selected>-- कैटेगरी चुनें --</option>
                        <option value="टॉप न्यूज़">टॉप न्यूज़</option>
                        <option value="छतरपुर">छतरपुर</option>
                        <option value="चुनाव 2026">चुनाव 2026</option>
                        <option value="एमपी पटाखा BLAST">एमपी पटाखा BLAST</option>
                        <option value="विदेश">विदेश</option>
                        <option value="वीडियो">वीडियो</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>न्यूज़ इमेज यूआरएल (Image URL)</label>
                    <input type="url" id="newsImageUrl" placeholder="https://i.imgur.com/... इमेज का लिंक डालें" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>वीडियो यूआरएल (Video URL)</label>
                    <input type="url" id="videoUrl" placeholder="https://youtube.com/... या शॉर्ट्स का लिंक">
                </div>

                <button type="submit" class="admin-btn" id="publishBtn">🚀 खबर लाइव पब्लिश करें</button>
            </form>
            <div id="statusMsg" class="msg"></div>
        </div>

        <div class="section-box hidden" id="manageSection">
            <h2>सभी पोस्ट मैनेज करें</h2>
            <p style="color: var(--sub-text); text-align: center; padding: 20px; font-size: 14px;">
                फायरबेस डेटाबेस से लाइव पोस्ट्स यहाँ सिंक हो रही हैं...
            </p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // TODO: यहाँ अपने Firebase Project का असली कॉन्फ़िगरेशन पेस्ट करें
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // सिर्फ इन दोनों ईमेल्स को परमिशन है (Whitelisted Emails)
        const allowedEmails = [
            "santoshking471@gmail.com",
            "jantavaninewsnetwork307@gmail.com"
        ];

        // 🔐 कड़क सुरक्षा जाँच (Real-time Auth Guard)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // चेक करो कि क्या यूजर की ईमेल लिस्ट में है
                if (!allowedEmails.includes(user.email.toLowerCase())) {
                    // अगर गलत ईमेल है, तो बाहर का रास्ता दिखाओ
                    forceLogout();
                }
                // अगर सही ईमेल है, तो वो इसी पेज पर रहेगा और अपना काम कर सकेगा।
            } else {
                // अगर यूजर ने लॉगिन ही नहीं किया है, तो उसे सीधे लॉगिन पेज पर फेंक दो
                window.location.href = "login.html";
            }
        });

        // लॉगआउट फंक्शन
        function forceLogout() {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        }

        // लॉगआउट बटन बाइंडिंग
        document.getElementById('logoutBtn').addEventListener('click', () => {
            forceLogout();
        });
    </script>

    <script type="module" src="admin.js"></script>
</body>
</html>
