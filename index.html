<!DOCTYPE html>
<html lang="hi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Janta Vani News Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <header class="main-header">
    <div class="logo-container">
        <img src="https://i.imgur.com/cwBsse2.jpeg" alt="JANTA VANI LOGO" class="brand-logo-img">
    </div>
    
    <div class="header-right-controls">
        <div class="search-bar-container">
            <input type="text" id="newsSearchInput" placeholder="खबरें खोजें..." autocomplete="off">
        </div>
        <button class="theme-toggle-btn" id="themeToggle">☀️ Light</button>
    </div>
</header>
    
<div id="searchResultsContainer" class="search-results-scroll hidden"></div>



    <nav class="tabs-container">
        <span class="tab-item active">टॉप न्यूज़</span>
        <span class="tab-item">छतरपुर</span>
        <span class="tab-item">चुनाव 2026</span>
        <span class="tab-item">एमपी पटाखा BLAST</span>
        <span class="tab-item">विदेश</span>
        <span class="tab-item">वीडियो</span>
    </nav>

    <main class="news-container" id="newsContainer">
        <div style="text-align:center; padding:30px; color:var(--sub-text);">समाचार लोड हो रहे हैं...</div>
    </main>

    <footer class="bottom-nav">
    <button class="nav-item active" id="nav-home">
        <i class="fa-solid fa-house"></i>
    </button>
    <button class="nav-item" id="nav-folder">
        <i class="fa-solid fa-folder-open"></i>
    </button>
  
    <button class="nav-item" id="nav-profile">
        <i class="fa-solid fa-circle-user"></i>
    </button>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
