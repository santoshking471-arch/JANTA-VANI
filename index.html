<!DOCTYPE html>
<html lang="hi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janta Vani News Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <img src="1000066677.jpg" alt="Janta Vani Logo" onerror="this.src='https://via.placeholder.com/150x40?text=Janta+Vani'">
        </div>
        <button class="theme-toggle-btn" id="themeToggle">☀️ Light</button>
    </header>

    <nav class="tabs-container">
        <span class="tab-item active">टॉप न्यूज़</span>
        <span class="tab-item">छतरपुर</span>
        <span class="tab-item">चुनाव 2026</span>
        <span class="tab-item">एमपी पटाखा ब्लास्ट</span>
        <span class="tab-item">विदेश</span>
        <span class="tab-item">बिजनेस</span>
    </nav>

    <main class="news-container" id="newsContainer">
        <div style="text-align:center; padding:20px; color:var(--sub-text);">समाचार लोड हो रहे हैं...</div>
    </main>

    <footer class="bottom-nav">
        <a href="#" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>होम</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">📺</span>
            <span>वीडियो</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>प्रोफ़ाइल</span>
        </a>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
